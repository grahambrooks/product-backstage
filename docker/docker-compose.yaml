services:
  backstage:
    image: ghcr.io/grahambrooks/product-backstage:latest
    ports:
      - '7007:7007'
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
    volumes:
      - ./app-config.docker.yaml:/app/app-config.docker.yaml:ro
    command:
      - node
      - packages/backend
      - --config
      - app-config.yaml
      - --config
      - app-config.docker.yaml
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
      POSTGRES_DB: backstage
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U backstage']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
