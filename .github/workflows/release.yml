name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@grahambrooks'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --mode=skip-build
        env:
          YARN_ENABLE_SCRIPTS: 'false'

      - name: Check types
        run: yarn tsc --project tsconfig.plugins.json --skipLibCheck

      - name: Build plugins
        run: |
          yarn workspace @internal/plugin-product build
          yarn workspace @internal/plugin-product-backend build

      - name: Lint plugins
        run: |
          yarn workspace @internal/plugin-product lint
          yarn workspace @internal/plugin-product-backend lint

      - name: Test plugins
        run: |
          yarn workspace @internal/plugin-product test
          yarn workspace @internal/plugin-product-backend test

      - name: Prepare packages for release
        run: ./scripts/prepare-release.sh

      - name: Publish @grahambrooks/plugin-product
        working-directory: plugins/product
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @grahambrooks/plugin-product-backend
        working-directory: plugins/product-backend
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
